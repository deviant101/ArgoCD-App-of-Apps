name: CI/CD Pipeline - Build & Push to ECR

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/**'
      - '.github/workflows/ci-pipeline.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 589736534170.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: app-of-apps

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app1-frontend: ${{ steps.changes.outputs.app1_frontend }}
      app2-api-gateway: ${{ steps.changes.outputs.app2_api_gateway }}
      app3-dashboard: ${{ steps.changes.outputs.app3_dashboard }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect changes
      id: changes
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          BASE="origin/main...HEAD"
        else
          BASE="HEAD~1..HEAD"
        fi
        
        echo "Comparing: $BASE"
        CHANGED_FILES=$(git diff --name-only $BASE)
        echo "Changed files:"
        echo "$CHANGED_FILES"

        if echo "$CHANGED_FILES" | grep -q '^apps/app1-frontend/'; then
          echo "app1_frontend=true" >> $GITHUB_OUTPUT
        else
          echo "app1_frontend=false" >> $GITHUB_OUTPUT
        fi
        
        if echo "$CHANGED_FILES" | grep -q '^apps/app2-api-gateway/'; then
          echo "app2_api_gateway=true" >> $GITHUB_OUTPUT
        else
          echo "app2_api_gateway=false" >> $GITHUB_OUTPUT
        fi
        
        if echo "$CHANGED_FILES" | grep -q '^apps/app3-dashboard/'; then
          echo "app3_dashboard=true" >> $GITHUB_OUTPUT
        else
          echo "app3_dashboard=false" >> $GITHUB_OUTPUT
        fi

  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app-name: app1-frontend
            dockerfile-path: apps/app1-frontend
            should-run: ${{ needs.detect-changes.outputs.app1-frontend == 'true' || github.event_name == 'workflow_dispatch' }}
          - app-name: app2-api-gateway
            dockerfile-path: apps/app2-api-gateway
            should-run: ${{ needs.detect-changes.outputs.app2-api-gateway == 'true' || github.event_name == 'workflow_dispatch' }}
          - app-name: app3-dashboard
            dockerfile-path: apps/app3-dashboard
            should-run: ${{ needs.detect-changes.outputs.app3-dashboard == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      id-token: write
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v4
      if: ${{ matrix.should-run }}

    - name: Set Docker image tag
      if: ${{ matrix.should-run }}
      id: image-tag
      run: |
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        SHORT_SHA=$(git rev-parse --short HEAD)
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        TAG="${BRANCH_NAME}-${SHORT_SHA}-${TIMESTAMP}"
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Building image: ${{ matrix.app-name }}:${TAG}"

    - name: Configure AWS credentials
      if: ${{ matrix.should-run }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      if: ${{ matrix.should-run }}
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container

    - name: Build and push Docker image to ECR
      if: ${{ matrix.should-run }}
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.dockerfile-path }}
        push: true
        tags: |
          ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.app-name }}-${{ steps.image-tag.outputs.tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image scan with Trivy
      if: ${{ matrix.should-run }}
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.app-name }}-${{ steps.image-tag.outputs.tag }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      if: ${{ matrix.should-run }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
        category: 'trivy-${{ matrix.app-name }}'

    - name: Update Kubernetes manifest
      if: ${{ matrix.should-run }}
      run: |
        sed -i "s|image: \"589736534170.dkr.ecr.us-east-1.amazonaws.com/app-of-apps:${{ matrix.app-name }}-.*\"|image: \"${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.app-name }}-${{ steps.image-tag.outputs.tag }}\"|g" k8s/${{ matrix.app-name }}/deployment.yaml

    - name: Upload modified manifest
      if: ${{ matrix.should-run }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.app-name }}-manifest
        path: k8s/${{ matrix.app-name }}/deployment.yaml
        retention-days: 1

  commit-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all modified manifests
      uses: actions/download-artifact@v4
      with:
        path: downloaded-artifacts
        merge-multiple: false

    - name: Place manifests in correct paths
      run: |
        # Artifacts are downloaded as downloaded-artifacts/<artifact-name>/deployment.yaml
        # We need to move them to k8s/<app-name>/deployment.yaml
        for artifact_dir in downloaded-artifacts/*-manifest/; do
          # Extract app name by removing "-manifest" suffix
          artifact_name=$(basename "$artifact_dir")
          app_name="${artifact_name%-manifest}"
          
          echo "Moving ${artifact_dir}deployment.yaml -> k8s/${app_name}/deployment.yaml"
          cp "${artifact_dir}deployment.yaml" "k8s/${app_name}/deployment.yaml"
        done

    - name: Commit all manifest updates
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        
        git add k8s/
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: update manifests"
          git push
        fi
