<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboardd</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #dc2626 0%, #1e293b 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white;
        }
        .container { text-align: center; padding: 2rem; max-width: 800px; }
        .icon { font-size: 5rem; margin-bottom: 1rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        h1 { font-size: 3rem; margin-bottom: 1rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .app-name { background: rgba(255,255,255,0.2); padding: 0.5rem 1.5rem; border-radius: 50px; font-size: 1.2rem; margin-bottom: 1.5rem; display: inline-block; }
        .description { font-size: 1.2rem; line-height: 1.6; opacity: 0.9; margin-bottom: 2rem; }
        .info-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 1.5rem; margin-top: 2rem; backdrop-filter: blur(10px); }
        .info-box h3 { margin-bottom: 1rem; color: #fbbf24; }
        .info-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .info-row:last-child { border-bottom: none; }
        .label { font-weight: bold; color: #94a3b8; }
        .value { font-family: monospace; color: #34d399; }
        .status { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(52, 211, 153, 0.2); padding: 0.5rem 1rem; border-radius: 50px; margin-top: 1rem; }
        .status-dot { width: 10px; height: 10px; background: #34d399; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📊</div>
        <h1>Dashboard App</h1>
        <div class="app-name">app3-dashboard</div>
        <p class="description">Internal admin dashboard for monitoring and management.</p>
        <div class="status"><span class="status-dot"></span><span>Running Healthy</span></div>
        <div class="info-box">
            <h3>📋 Application Info</h3>
            <div class="info-row"><span class="label">App Name:</span><span class="value">app3-dashboard</span></div>
            <div class="info-row"><span class="label">Container Port:</span><span class="value">8082</span></div>
            <div class="info-row"><span class="label">Base Image:</span><span class="value">nginx:alpine</span></div>
            <div class="info-row"><span class="label">Environment:</span><span class="value">development</span></div>
            <div class="info-row"><span class="label">Version:</span><span class="value">1.0.0</span></div>
        </div>
    </div>
</body>
</html>
