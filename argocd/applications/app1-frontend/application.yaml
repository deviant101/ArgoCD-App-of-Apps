apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app1-frontend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://deviant101.github.io/helm-charts
      chart: app1-frontend
      targetRevision: 0.1.0
      helm:
        valueFiles:
          - $values/argocd/applications/app1-frontend/values.yaml
    - repoURL: https://github.com/deviant101/ArgoCD-App-of-Apps.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: app1-frontend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
