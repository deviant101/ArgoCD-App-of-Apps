appName: app1-frontend
namespace: app1-frontend

namespaceLabels:
  managed-by: argocd

image:
  repository: 589736534170.dkr.ecr.us-east-1.amazonaws.com/app-of-apps
  tag: app1-frontend-main-96f6e82-20260623081509
  pullPolicy: IfNotPresent

replicaCount: 4

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 101
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  containerPort: 8080

httpRoute:
  enabled: true
  gateway:
    name: cilium-gateway
    namespace: demo-gateway
    sectionName: https
  hostname: app1.rancher.live
  pathPrefix: /
