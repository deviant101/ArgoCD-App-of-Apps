apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app3-dashboard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/deviant101/ArgoCD-App-of-Apps.git
    targetRevision: main
    path: k8s/app3-dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: app3-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
